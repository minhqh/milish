version: '3.8'

services:
  # Cấu hình cho FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: milish_backend
    ports:
      - "8000:8000"
    volumes:
      # Mount trực tiếp thư mục app để code thay đổi trên máy sẽ cập nhật ngay vào container
      - ./backend/app:/code/app
    env_file:
      - ./backend/.env
    # Giúp Uvicorn nhận diện sự thay đổi file trên một số môi trường Linux
    environment:
      - WATCHFILES_FORCE_POLLING=true 
    networks:
      - milish_network

  # Cấu hình cho React + Vite
  frontend:
    image: node:20-alpine
    container_name: milish_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      # Mount toàn bộ code frontend vào container
      - ./frontend:/app
      # Tránh ghi đè thư mục node_modules của container bằng thư mục trống trên máy host
      - /app/node_modules
    # Tự động cài package nếu chưa có và chạy Vite ở chế độ host để expose ra ngoài Docker
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      # Fix lỗi Vite đôi khi không bắt được event thay đổi file trên Docker
      - CHOKIDAR_USEPOLLING=true
    networks:
      - milish_network
    depends_on:
      - backend

networks:
  milish_network:
    driver: bridge